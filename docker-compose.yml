version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: pokemon-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-pokemon_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pokemon_password}
      POSTGRES_DB: ${DB_NAME:-pokemon_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-pokemon_user} -d ${DB_NAME:-pokemon_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pokemon-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-pokemon_user}
      - DB_PASSWORD=${DB_PASSWORD:-pokemon_password}
      - DB_NAME=${DB_NAME:-pokemon_db}
      - PORT=3000
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: npm run dev

volumes:
  postgres_data:
